services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///data/vulnscout.db
      - MODEL_CACHE_DIR=/models
      - OLLAMA_API_URL=http://ollama:11434
      - OPENAI_BASE_URL=http://ollama:11434/v1
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    volumes:
      - ./data:/app/data
      - model_cache:/models
    depends_on:
      - ollama

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run build && npx serve -s dist -l 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      - api

  ollama:
    image: ollama/ollama:latest
    # No host port mapping (avoids conflict with local Ollama on :11434)
    # Containers access it via internal DNS: http://ollama:11434
    volumes:
      - ollama_data:/root/.ollama

volumes:
  model_cache:
  ollama_data:
